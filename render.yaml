# Render Infrastructure-as-Code for the Bard Santner institutional site.
#
# Static site deploy: React + Vite build in /frontend, output to /frontend/dist.
# Puppeteer prerender included so social unfurlers, search crawlers and
# AI scrapers see real content per-route, not the bare SPA shell.
#
# Connected to: github.com/Mutombe/bard-platform-v1 (branch: main)
# Render owner: Account 4 (Taqon's workspace)
services:
  - type: web
    runtime: static
    name: bard-platform-v1
    repo: https://github.com/Mutombe/bard-platform-v1
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
